<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">

<body>

<h1>Kampus ITBSS</h1>

<nav>
<a href="#home">Home</a> |

<a href="#program studi">Program Studi</a> |
<a href="#kontak">Kontak</a> |
<a href="#pendaftaran">Pendaftaran</a>
</nav>

<hr>

<section>

<h2>Form Pendaftaran Mahasiswa Baru</h2>

<form>

<label>Nama Lengkap:</label><br>
<input type="text" name="nama"><br><br>

<label>Email:</label><br>
<input type="email" name="email"><br><br>

<label>Password:</label><br>
<input type="password" name="password"><br><br>

<label>Tanggal Lahir:</label><br>
<input type="date" name="tgl_lahir"><br><br>

<label>Nomor HP:</label><br>
<input type="text" name="hp"><br><br>

<label>Jenis Kelamin:</label><br>
<input type="radio" name="gender" value="Laki-laki"> Laki-laki
<input type="radio" name="gender" value="Perempuan"> Perempuan
<br><br>

<label>Program Studi:</label><br>
<input type="checkbox" name="prodi1"> Sistem Informasi<br>
<input type="checkbox" name="prodi2"> Informatika<br>
<input type="checkbox" name="prodi3"> Bisnis Digital<br><br>

<label>Alamat:</label><br>
<textarea name="alamat" rows="4" cols="40"></textarea>
<br><br>

<label>Kota:</label><br>
<input type="text" name="kota"><br><br>

<label>Upload Foto:</label><br>
<input type="file" name="foto"><br><br>

<input type="submit" value="Daftar">
<input type="reset" value="Reset">

</form>

</section>

</body>
</html>
